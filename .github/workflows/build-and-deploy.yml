name: 构建并部署博客

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: netlify-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Docusaurus 构建与 Netlify 部署
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: 'true'
      BILI_PARSER_API: /api
      BILI_PARSER_MODE: netlify
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: 安装依赖
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: 构建静态网站
        run: npm run build

      - name: 部署网站与 Netlify Functions
        run: >-
          npx --yes netlify-cli@26.2.0 deploy
          --prod
          --dir=build
          --functions=netlify/functions
          --message="GitHub Actions ${GITHUB_SHA}"
